name: offmusic
description: "Stream YouTube Music with offline caching, playlists, lyrics, and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # YouTube
  youtube_explode_dart: ^2.3.5

  # Audio
  just_audio: ^0.9.41
  audio_session: ^0.1.21

  # State management
  provider: ^6.1.2

  # Local database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # File & caching
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  crypto: ^3.0.3

  # UI
  palette_generator: ^0.3.3+3
  shimmer: ^3.0.0
  glass_kit: ^3.0.0

  # Lyrics
  http: ^1.2.2

  # Preferences
  shared_preferences: ^2.3.3

  # URL
  url_launcher: ^6.3.1

  # Import / Export
  share_plus: ^10.1.4
  file_picker: ^8.1.7

  # Utils
  rxdart: ^0.28.0
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "off_music_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "off_music_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
